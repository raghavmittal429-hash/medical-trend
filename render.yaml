services:
  - type: web
    name: medical-trend-backend
    runtime: python
    region: ohio
    plan: free
    branch: main
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://raghavmittal429-hash.github.io
