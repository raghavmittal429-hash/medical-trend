name: Deploy Backend and Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend to PythonAnywhere
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to PythonAnywhere via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PYTHONANYWHERE_HOST }}
          username: ${{ secrets.PYTHONANYWHERE_USERNAME }}
          key: ${{ secrets.PYTHONANYWHERE_SSH_KEY }}
          port: 22
          script: |
            cd ~/${{ secrets.PYTHONANYWHERE_APP_DIR }}
            git pull origin main
            source venv/bin/activate
            pip install -r backend/requirements.txt
            touch /var/www/${{ secrets.PYTHONANYWHERE_USERNAME }}_pythonanywhere_com_wsgi.py

  deploy-frontend:
    name: Build and Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Install Flutter dependencies
        run: |
          cd flutter_app
          flutter pub get
      - name: Build Flutter web app
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          cd flutter_app
          flutter build web --dart-define=API_BASE_URL=${API_BASE_URL} --release
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./flutter_app/build/web
