name: Deploy Backend and Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: No Backend Deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip backend deployment
        run: echo "Backend deployment disabled — configure deployment job as needed."

  deploy-frontend:
    name: Build and Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Install Flutter dependencies
        run: |
          cd flutter_app
          flutter pub get
      - name: Build Flutter web app
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          cd flutter_app
          flutter build web --dart-define=API_BASE_URL=${API_BASE_URL} --release
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./flutter_app/build/web
