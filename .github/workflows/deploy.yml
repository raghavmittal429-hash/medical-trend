name: Deploy Backend and Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Deploy backend to Railway
        uses: railwayapp/railway-action@v0.2.8
        with:
          railwayToken: ${{ secrets.RAILWAY_API_KEY }}
          projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
          environment: ${{ secrets.RAILWAY_ENVIRONMENT }}
          path: backend

  deploy-frontend:
    name: Build and Deploy Frontend to Netlify
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Install Flutter dependencies
        run: |
          cd flutter_app
          flutter pub get
      - name: Build Flutter web app
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          cd flutter_app
          flutter build web --dart-define=API_BASE_URL=${API_BASE_URL} --release
      - name: Install Netlify CLI
        run: npm install netlify-cli
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx netlify deploy --prod --dir=flutter_app/build/web --site=${NETLIFY_SITE_ID} --auth=${NETLIFY_AUTH_TOKEN}
