name: medical_cdss
description: AI-based Medical Report System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  flutter_tts: ^3.8.5
  fl_chart: ^0.69.0
  file_picker: ^8.1.6
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/medisimple_logo.jpg
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
    - assets/fonts/NotoSansDevanagari-Regular.ttf
    - assets/fonts/NotoSansDevanagari-Bold.ttf
    - assets/fonts/NotoSansTamil-Regular.ttf
    - assets/fonts/NotoSansBengali-Regular.ttf
    - assets/fonts/NotoSansArabic-Regular.ttf
